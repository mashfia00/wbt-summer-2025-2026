<!DOCTYPE html>
<html>
<head>
 <title>Contact Form</title>
</head>
<body>
 
<form>
 <fieldset>
 <legend>Contact Me!</legend>
 
 <table>
 <tr>
 <td>First Name:</td>
 <td><input type="text" name="firstname"></td>
 </tr>
 
 <tr>
 <td>Last Name:</td>
 <td><input type="text" name="lastname"></td>
 </tr>
 
 <tr>
 <td><lable>Gender:</lable></td>
 <td>
 <input type="radio" name="gender" value="male"> Male
 <input type="radio" name="gender" value="female"> Female
 </td>
 </tr>
 
 <tr>
 <td>Email:</td>
 <td><input type="email" name="email"></td>
 </tr>
 
 <tr>
 <td>Services:</td>
 <td>
 <input type="checkbox"> value="web development"> Web Development
 <input type="checkbox"> value="ai/ml"> AI/ML
 <input type="checkbox"> value="backend"> Backend
 </td>
 </tr>
 
 <tr>
 <td>Reason of Contact:</td>
 <td>
 <select>
 <option>Job</option>
 <option>Projects</option>
 <option>Thesis</option>
 </select>
 </td>
 </tr>
 
 <tr>
 <td><lable for="boolslot">Book Slot:</lable></td>
 <td><input type="date"></td>
 </tr>
 
 <tr>
 <td colspan="2" align="center">
 <input type="submit" value="Submit">
 <input type="reset">
 </td>
 </tr>
 </table>
 
 </fieldset>
</form>
 
</body>
</html>
