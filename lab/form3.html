<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form3</title>
</head>
 
<body>
 
    <form method="post">
 
        <h1>Create your account</h1>
        <p>Join us in a couple steps.</p>
        <hr>
 
        <div class="field">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Jane Doe">
        </div>
 
 
        <div class="field">
            <label for="age">Age</label><br>
            <input type="number" id="age" placeholder="28">
        </div>
 
 
        <div class="field">
            <label for="dob">Date of Birth</label><br>
            <input type="date" id="dob">
        </div>
 
 
        <div class="field">
            <label for="email">Email Address</label><br>
            <input type="email" id="email" placeholder="jane@company.com">
        </div>
 
 
        <div class="field">
            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder=".......">
        </div>
 
 
        <div class="radiobutton">
            <lable for="preferred contact">Preffered contact</lable>
            <input type="radio" name="contact" value="email">Email
            <input type="radio" name="contact" value="phone">Phone
            <input type="radio" name="contact" value="sms">SMS
        </div>
 
 
        <div class="button">
            <button type="submit"class="btn-primary">Submit</button>
            <button type="reset" class="btn secondary">Reset</button>
        </div>
 
    </form>
 
</body>
</html>
